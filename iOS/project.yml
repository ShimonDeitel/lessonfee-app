name: Lessonfee
options:
  bundleIdPrefix: com.shimondeitel.lessonfee
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Lessonfee:
    type: application
    platform: iOS
    sources:
      - path: Lessonfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lessonfee
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Lessonfee/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LessonfeeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LessonfeeTests
      - path: Lessonfee.storekit
    dependencies:
      - target: Lessonfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lessonfee.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LessonfeeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LessonfeeUITests
    dependencies:
      - target: Lessonfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lessonfee.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Lessonfee:
    build:
      targets:
        Lessonfee: all
        LessonfeeTests: [test]
        LessonfeeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Lessonfee.storekit
    test:
      config: Debug
      storeKitConfiguration: Lessonfee.storekit
      targets:
        - LessonfeeTests
        - LessonfeeUITests
    archive:
      config: Release
